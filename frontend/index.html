<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#09090b" />

  <!-- Default robots (overridden per-page by react-helmet-async) -->
  <meta name="robots" content="index, follow" />

  <!-- Default title & description (overridden per-page by react-helmet-async) -->
  <title>OBSIDIAN TECH — Latest Smartphones &amp; Best Deals in India</title>
  <meta name="description"
    content="Shop the latest iPhones, Samsung Galaxy, OnePlus, Google Pixel and more at OBSIDIAN TECH. AI-powered recommendations, 500+ phones, free shipping on orders above ₹50,000." />
  <meta name="keywords"
    content="buy mobile online, smartphones India, iPhone price India, Samsung Galaxy, OnePlus, best mobile deals, OBSIDIAN TECH" />
  <meta name="author" content="OBSIDIAN TECH" />

  <!-- Open Graph base (overridden per-page by react-helmet-async) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="OBSIDIAN TECH" />
  <meta property="og:title" content="OBSIDIAN TECH — Latest Smartphones &amp; Best Deals in India" />
  <meta property="og:description" content="Shop the latest iPhones, Samsung Galaxy, OnePlus and more at OBSIDIAN TECH." />
  <meta property="og:url" content="http://localhost:5000/" />

  <meta property="og:locale" content="en_IN" />

  <!-- Twitter Card base (overridden per-page by react-helmet-async) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@OBSIDIANTECH" />
  <meta name="twitter:title" content="OBSIDIAN TECH — Latest Smartphones &amp; Best Deals in India" />
  <meta name="twitter:description"
    content="Shop the latest iPhones, Samsung Galaxy, OnePlus and more at OBSIDIAN TECH." />


  <!-- Canonical base (overridden per-page by react-helmet-async) -->
  <link rel="canonical" href="http://localhost:5000/" />



  <!-- Preconnect hints for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Base JSON-LD — Organization + WebSite schema (always present) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "name": "OBSIDIAN TECH",
        "url": "http://localhost:5000",

        "sameAs": [
          "#",
          "#",
          "#"
        ]
      },
      {
        "@type": "WebSite",
        "name": "OBSIDIAN TECH",
        "url": "http://localhost:5000",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "http://localhost:5000/products?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    ]
  }
  </script>

  <!-- Payment Gateway Scripts -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
