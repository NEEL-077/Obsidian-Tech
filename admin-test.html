<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>ObsidianTech Admin Panel Test</h1>
    
    <div id="status"></div>
    
    <h2>Test Admin Login</h2>
    <button onclick="testLogin()">Test Admin Login</button>
    <div id="loginResult"></div>
    
    <h2>Test Admin APIs</h2>
    <button onclick="testStats()">Test Stats API</button>
    <button onclick="testUsers()">Test Users API</button>
    <button onclick="testOrders()">Test Orders API</button>
    <div id="apiResults"></div>
    
    <h2>Access Admin Panel</h2>
    <a href="http://localhost:5000/admin" target="_blank">
        <button>Open Admin Panel</button>
    </a>
    
    <script>
        async function testLogin() {
            const result = document.getElementById('loginResult');
            try {
                const response = await fetch('http://localhost:5000/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: 'admin', password: 'admin123' })
                });
                const data = await response.json();
                if (data.isAdmin) {
                    result.innerHTML = '<div class="status success">✅ Admin login successful! Token: ' + data.token.substring(0, 20) + '...</div>';
                    window.adminToken = data.token;
                } else {
                    result.innerHTML = '<div class="status error">❌ Login failed: Not admin</div>';
                }
            } catch (error) {
                result.innerHTML = '<div class="status error">❌ Login error: ' + error.message + '</div>';
            }
        }
        
        async function testStats() {
            const result = document.getElementById('apiResults');
            try {
                const response = await fetch('http://localhost:5000/api/admin/stats');
                const data = await response.json();
                result.innerHTML = '<div class="status success">✅ Stats API working! Products: ' + data.totalProducts + ', Users: ' + data.totalUsers + ', Orders: ' + data.totalOrders + '</div>';
            } catch (error) {
                result.innerHTML = '<div class="status error">❌ Stats API error: ' + error.message + '</div>';
            }
        }
        
        async function testUsers() {
            const result = document.getElementById('apiResults');
            try {
                const response = await fetch('http://localhost:5000/api/admin/users');
                const data = await response.json();
                result.innerHTML = '<div class="status success">✅ Users API working! Found ' + data.length + ' users</div>';
            } catch (error) {
                result.innerHTML = '<div class="status error">❌ Users API error: ' + error.message + '</div>';
            }
        }
        
        async function testOrders() {
            const result = document.getElementById('apiResults');
            try {
                const response = await fetch('http://localhost:5000/api/admin/orders');
                const data = await response.json();
                result.innerHTML = '<div class="status success">✅ Orders API working! Found ' + data.length + ' orders</div>';
            } catch (error) {
                result.innerHTML = '<div class="status error">❌ Orders API error: ' + error.message + '</div>';
            }
        }
        
        // Test server status on load
        window.onload = async function() {
            const status = document.getElementById('status');
            try {
                const response = await fetch('http://localhost:5000/health');
                const data = await response.json();
                status.innerHTML = '<div class="status success">✅ Server is running on port 5000</div>';
            } catch (error) {
                status.innerHTML = '<div class="status error">❌ Server not responding</div>';
            }
        }
    </script>
</body>
</html>
